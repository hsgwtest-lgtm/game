<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>SoftEvo - 軟体生物進化シミュレータ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="mainCanvas"></canvas>
  <div id="ui-overlay">
    <div id="top-bar">
      <div id="stats">
        <span id="gen-info">🧬 世代 0</span>
        <span id="best-info">🏆 0px</span>
        <span id="avg-info">📊 0px</span>
        <span id="fps-counter">FPS: 0</span>
      </div>
      <div id="ranking"></div>
      <div id="speed-control">
        <button id="btn-pause" title="一時停止">⏸</button>
        <button id="btn-play" title="再生" class="active">▶</button>
        <button id="btn-fast" title="倍速">⏩</button>
        <button id="btn-skip" title="世代スキップ">⏭</button>
        <button id="btn-config" title="設定 (COF)">⚙️</button>
      </div>
    </div>
    <div id="toolbar">
      <button class="tool-btn active" data-tool="observe" title="観察">👁</button>
      <button class="tool-btn" data-tool="block" title="ブロック配置">🧱</button>
      <button class="tool-btn" data-tool="erase" title="消しゴム（地形）">🧹</button>
      <button class="tool-btn" data-tool="goal" title="ゴール配置">🎯</button>
      <button class="tool-btn tool-del" data-tool="delete-goal" title="ゴール削除">❌</button>
      <div id="brush-radius-control" class="hidden">
        <label>範囲</label>
        <input type="range" id="brush-radius-slider" min="1" max="10" value="2" step="1">
        <span id="brush-radius-value">2</span>
      </div>
      <div class="tool-separator"></div>
      <button class="tool-btn tool-action" data-tool="poke" title="つつく">👆</button>
      <button class="tool-btn tool-action" data-tool="restart" title="最初からやり直し">🔄</button>
    </div>
    <div id="bottom-bar">
      <div id="eval-progress-bar"><div id="eval-fill"></div></div>
      <div id="bottom-content">
        <div id="eval-timer">⏱ 0.0 / 10.0s</div>
        <div id="toggles">
          <label><input type="checkbox" id="toggle-muscles" checked> 筋肉</label>
          <label><input type="checkbox" id="toggle-trails"> 軌跡</label>
          <label><input type="checkbox" id="toggle-grid"> グリッド</label>
          <label><input type="checkbox" id="toggle-graph"> グラフ</label>
        </div>
      </div>
    </div>
  </div>
  <div id="graph-panel" class="hidden">
    <div id="graph-header">
      <span>📈 適応度推移</span>
      <button id="close-graph">✕</button>
    </div>
    <canvas id="graphCanvas" width="360" height="180"></canvas>
  </div>
  <div id="config-panel" class="hidden">
    <div id="config-header">
      <span>⚙️ COF - パラメータ設定</span>
      <button id="close-config">✕</button>
    </div>
    <div id="config-content"></div>
  </div>
  <div id="info-panel" class="hidden">
    <button id="close-info">✕</button>
    <div id="info-content"></div>
  </div>
  <div id="event-log"></div>
  <div id="gen-flash"></div>
</div>
<script src="engine.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
