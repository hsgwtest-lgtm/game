<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>SoftEvo - 軟体生物AI進化シミュレータ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="mainCanvas"></canvas>
  <div id="ui-overlay">
    <div id="top-bar">
      <div id="stats">
        <span id="gen-info">Gen: 0</span>
        <span id="best-info">Best: 0px</span>
        <span id="avg-info">Avg: 0px</span>
        <span id="fps-counter">FPS: 0</span>
      </div>
      <div id="speed-control">
        <button id="btn-pause" title="一時停止/再生">⏸</button>
        <button id="btn-speed" title="倍速トグル">⏩</button>
      </div>
    </div>
    <div id="bottom-bar">
      <div class="slider-row">
        <label>重力</label>
        <input type="range" id="slider-gravity" min="0" max="3" step="0.1" value="1">
        <span id="val-gravity">1.0</span>
      </div>
      <div class="slider-row">
        <label>摩擦</label>
        <input type="range" id="slider-friction" min="0" max="1" step="0.05" value="0.5">
        <span id="val-friction">0.50</span>
      </div>
      <div class="slider-row">
        <label>変異率</label>
        <input type="range" id="slider-mutation" min="0" max="0.5" step="0.01" value="0.1">
        <span id="val-mutation">0.10</span>
      </div>
    </div>
  </div>
  <div id="gen-flash"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="engine.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
